<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق السيارات الاحترافي</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .nav-glass {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .car-image {
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
        }

        /* Smooth animation */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="pb-20">

    <!-- Navbar -->
    <nav class="nav-glass sticky top-0 z-50 p-4 flex justify-between items-center px-6">
        <h1 class="text-2xl font-bold tracking-wider">سيارتي <span class="text-yellow-400">Hub</span></h1>
        <div class="flex gap-4">
            <button id="loginBtn" class="glass-card px-4 py-2 text-sm">تسجيل دخول</button>
            <i class="fas fa-bars text-2xl cursor-pointer"></i>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="p-6 text-center mt-6 fade-in">
        <h2 class="text-3xl font-bold mb-2">ابحث عن سيارة أحلامك</h2>
        <p class="text-gray-200">من المعارض مباشرة أو من الملاك الأفراد</p>

        <div class="mt-6 flex max-w-md mx-auto">
            <input type="text" placeholder="ماركة السيارة، الموديل..."
                class="glass-card w-full p-4 outline-none text-white placeholder-gray-300">
            <button
                class="bg-yellow-500 text-black px-6 rounded-l-20 py-4 -mr-2 font-bold rounded-xl shadow-lg">بحث</button>
        </div>
    </header>

    <!-- Categories -->
    <div class="flex gap-4 overflow-x-auto p-6 no-scrollbar">
        <div class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
            <i class="fas fa-car"></i> سيدان
        </div>
        <div class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
            <i class="fas fa-truck-pickup"></i> دفع رباعي
        </div>
        <div class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
            <i class="fas fa-bolt"></i> كهربائية
        </div>
        <div class="glass-card flex-shrink-0 px-6 py-3 flex items-center gap-2">
            <i class="fas fa-store"></i> المعارض
        </div>
    </div>

    <!-- Car Listings Grid -->
    <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- Car Card Example -->
        <div class="glass-card p-4 fade-in">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=800&q=80"
                alt="Car" class="car-image w-full mb-4">
            <div class="flex justify-between items-start mb-2">
                <h3 class="text-xl font-bold">بورش 911 كاريرا</h3>
                <span class="bg-green-500 text-xs px-2 py-1 rounded">معرض</span>
            </div>
            <p class="text-yellow-400 font-bold text-lg mb-4">450,000 ريال</p>
            <div class="flex justify-between text-sm text-gray-300 border-t border-white/10 pt-4">
                <span><i class="fas fa-tachometer-alt ml-1"></i> 15,000 كم</span>
                <span><i class="fas fa-calendar-alt ml-1"></i> 2023</span>
                <span><i class="fas fa-map-marker-alt ml-1"></i> الرياض</span>
            </div>
            <button class="w-full mt-4 bg-white/20 hover:bg-white/30 py-3 rounded-xl transition">تفاصيل السيارة</button>
        </div>

        <!-- Car Card Example 2 (From Individual) -->
        <div class="glass-card p-4 fade-in">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=800&q=80"
                alt="Car" class="car-image w-full mb-4">
            <div class="flex justify-between items-start mb-2">
                <h3 class="text-xl font-bold">بي ام دبليو M4</h3>
                <span class="bg-blue-500 text-xs px-2 py-1 rounded">فرد</span>
            </div>
            <p class="text-yellow-400 font-bold text-lg mb-4">320,000 ريال</p>
            <div class="flex justify-between text-sm text-gray-300 border-t border-white/10 pt-4">
                <span><i class="fas fa-tachometer-alt ml-1"></i> 40,000 كم</span>
                <span><i class="fas fa-calendar-alt ml-1"></i> 2021</span>
                <span><i class="fas fa-map-marker-alt ml-1"></i> جدة</span>
            </div>
            <button class="w-full mt-4 bg-white/20 hover:bg-white/30 py-3 rounded-xl transition">تفاصيل السيارة</button>
        </div>

    </main>

    <!-- Floating Action Button to Add Car -->
    <div class="fixed bottom-6 left-6">
        <button
            class="bg-yellow-500 text-black w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl font-bold hover:scale-110 transition">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- Service Worker for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker Registered');
                }).catch(err => {
                    console.log('Service Worker Registration Failed', err);
                });
            });
        }
    </script>
</body>

</html>
